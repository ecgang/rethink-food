name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # generate/build don't connect to a DB (dashboard routes are force-dynamic),
      # but Prisma wants the var present.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
